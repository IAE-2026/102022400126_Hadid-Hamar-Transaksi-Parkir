services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=base64:st2FXQB17Q9BmQ1YSRVAF7qh02lXXPHCoFxf5AIfgYg=
      - APP_URL=http://localhost:3002
      - PORT=3002
      - LOG_CHANNEL=stack
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=service_b
      - DB_USERNAME=service_b
      - DB_PASSWORD=service_b_secret
      - IAE_INTERNAL_KEY=102022400126
      - IAE_API_KEYS=102022400126
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - service-b-net

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=service_b
      - MYSQL_USER=service_b
      - MYSQL_PASSWORD=service_b_secret
      - MYSQL_ROOT_PASSWORD=root_secret
    volumes:
      - service-b-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - service-b-net

volumes:
  service-b-mysql-data:

networks:
  service-b-net:
    driver: bridge
